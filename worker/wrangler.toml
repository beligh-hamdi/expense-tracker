name       = "expense-tracker-token-proxy"
main       = "index.js"
compatibility_date = "2024-01-01"

# Secrets are set via Cloudflare dashboard or CLI — never stored here:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#
# These are environment variables accessed as env.GOOGLE_CLIENT_ID etc.
# in the worker. They are NEVER visible in the browser bundle.
