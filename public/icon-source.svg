<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: azure blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <!-- Wallet body gradient -->
    <linearGradient id="wallet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E3F2FD" stop-opacity="0.90"/>
    </linearGradient>
    <!-- Accent gradient for card stripe -->
    <linearGradient id="stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <!-- AI spark gradient -->
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0D47A1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Wallet body -->
  <g filter="url(#shadow)">
    <rect x="80" y="160" width="352" height="230" rx="28" ry="28" fill="url(#wallet)"/>
    <!-- Wallet flap / top fold -->
    <rect x="80" y="160" width="352" height="52" rx="28" ry="28" fill="#1976D2" opacity="0.18"/>
    <!-- Color stripe on top -->
    <rect x="80" y="188" width="352" height="8" rx="4" fill="url(#stripe)"/>
    <!-- Card chip placeholder -->
    <rect x="116" y="238" width="52" height="38" rx="8" fill="#FFC107" opacity="0.85"/>
    <!-- Card horizontal lines -->
    <rect x="116" y="300" width="140" height="10" rx="5" fill="#1565C0" opacity="0.25"/>
    <rect x="116" y="322" width="90" height="10" rx="5" fill="#1565C0" opacity="0.18"/>
  </g>

  <!-- Pocket / card holder on right -->
  <rect x="306" y="222" width="104" height="72" rx="14" fill="#1976D2" opacity="0.12"/>
  <rect x="318" y="234" width="80" height="10" rx="5" fill="#1976D2" opacity="0.35"/>
  <rect x="318" y="252" width="56" height="10" rx="5" fill="#1976D2" opacity="0.25"/>

  <!-- AI spark / lightning bolt (top-right badge) -->
  <circle cx="386" cy="148" r="54" fill="#0D47A1"/>
  <circle cx="386" cy="148" r="48" fill="url(#spark)"/>
  <!-- Spark star shape: simple 4-point star -->
  <path d="M386 110 L394 140 L424 148 L394 156 L386 186 L378 156 L348 148 L378 140 Z"
        fill="white" opacity="0.92"/>
</svg>
