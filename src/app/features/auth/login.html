
    <div class="login-page" *transloco="let t; prefix: 'login'">
      <mat-card class="login-card">
        <mat-card-header>
          <mat-card-title>
            <mat-icon class="app-icon">account_balance_wallet</mat-icon>
            {{ t('app_title') }}
          </mat-card-title>
          <mat-card-subtitle>
            {{ t('app_subtitle') }}
          </mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
          <p class="login-description">
            {{ t('login_description') }}
          </p>
        </mat-card-content>

        <mat-card-actions>
          <button
            mat-raised-button
            color="primary"
            class="google-btn"
            (click)="signIn()"
          >
            <img
              src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
              alt="Google logo"
              class="google-logo"
            />
            {{ t('sign_in_button') }}
          </button>
        </mat-card-actions>
      </mat-card>
    </div>
